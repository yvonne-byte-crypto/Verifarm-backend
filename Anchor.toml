[toolchain]
anchor_version = "0.31.0"

[features]
resolution = true
skip-lint = false

[programs.localnet]
verifarm = "9teMVR4r2AB9T5bB4YgXJ38G6mMbxTF6bFm8UYizqx8N"

[programs.devnet]
verifarm = "9teMVR4r2AB9T5bB4YgXJ38G6mMbxTF6bFm8UYizqx8N"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
initialize = "yarn run ts-node -P ./tsconfig.json scripts/initialize.ts"
